<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Practice</title>
    <link rel="stylesheet" href="animation2.css">
</head>
<body>

    <h1>CSS Animation Practice</h1>

    <div class="container">

        
        <div class="box">
            <h2>Moving Circle</h2>
            <div class="circle"></div>
        </div>

     
        <div class="box">
            <h2>Rotating Square</h2>
            <div class="square"></div>
        </div>

      
        <div class="box">
            <h2>Bouncing Ball</h2>
            <div class="bounce-area">
                <div class="ball"></div>
            </div>
        </div>

       
        <div class="box">
            <h2>Loading Spinner</h2>
            <div class="spinner"></div>
        </div>

    </div>

</body>
</html>
